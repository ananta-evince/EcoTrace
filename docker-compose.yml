services:
  postgres:
    image: postgres:16-alpine
    container_name: ecotrace-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ecotrace
      POSTGRES_PASSWORD: ecotrace
      POSTGRES_DB: ecotrace
    volumes:
      - ecotrace_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ecotrace -d ecotrace']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ecotrace_pgdata:
